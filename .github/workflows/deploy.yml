name: Deploy Dashy to GitHub Pages

on:
  push:
    branches: [ master ] # Or 'main' depending on your repo's default branch
  workflow_dispatch: # Allows you to run this manually from the Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Dashy usually requires Node 18 or 20
          cache: 'yarn'

      - name: Install Dependencies
        run: yarn install --frozen-lockfile

      - name: Build Dashboard
        run: yarn build
        env:
          NODE_OPTIONS: "--max_old_space_size=4096"
          BASE_URL: "/https://ehodgesnbs.github.io/dashy/"  # Replace with your actual repository name

      - name: Create .nojekyll
        run: touch ./dist/.nojekyll

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
